kind = "web"
previewPath = "/"
title = "Guia CAR"
version = "1.0.0"
id = "artifacts/car-guia"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23533

[services.development]
run = "pnpm --filter @workspace/car-guia run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/car-guia", "run", "build" ]
publicDir = "artifacts/car-guia/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23533"
BASE_PATH = "/"
