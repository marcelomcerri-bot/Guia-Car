[build]
  command = "pnpm install && pnpm --filter @workspace/car-guia run build"
  publish = "artifacts/car-guia/dist/public"

[build.environment]
  NODE_VERSION = "20"
  PORT = "3000"
  BASE_PATH = "/"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
